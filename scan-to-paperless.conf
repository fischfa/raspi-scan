# scan-to-paperless.conf
# Shell-kompatible Konfigurationsdatei für /usr/local/bin/scan-to-paperless.sh
#
# Zielbild:
#   scanbd + Scanner-Taste -> ADF Duplex -> Leerseiten entfernen -> PDF -> Übergabe an Paperless consume
#
# Standard in dieser Datei:
#   - Fujitsu fi-6130 fest als Gerät eingetragen
#   - A4, Duplex, Gray, 300 dpi
#   - NFS-/lokaler Zielordner als Standard (UPLOAD_METHOD=filesystem)
#   - SFTP als alternative Option vorbereitet
#
# Wichtiger Hinweis zu scanbd:
#   scanbd selbst liest diese Datei NICHT.
#   Die BUTTON_* Variablen unten sind zentrale Dokumentation, damit alles an einer Stelle steht.
#   Die eigentliche scanbd-Aktion legst du in /etc/scanbd/scanbd.conf oder einer Include-Datei an.
#
# Beispiel für scanbd (separat in /etc/scanbd/...):
#   action scan {
#     filter = "^scan$"
#     numerical-trigger {
#       from-value = 1
#       to-value = 0
#     }
#     desc = "Scan to Paperless"
#     script = "/usr/local/bin/scan-to-paperless.sh"
#   }

# -----------------------------------------------------------------------------
# Logging / Dateinamen / lokale Ablage
# -----------------------------------------------------------------------------
LOG_TAG="scan-to-paperless"
FILE_PREFIX="import"
KEEP_LOCAL_COPY="false"
REVERSE_PAGE_ORDER="true"
PDF_ROTATION="180"
SPOOL_DIR="/var/lib/scan-to-paperless/spool"
ARCHIVE_DIR="/var/lib/scan-to-paperless/archive"
LOCK_FILE="/var/lib/scan-to-paperless/scan-to-paperless.lock"

# -----------------------------------------------------------------------------
# Scanner / Scanverhalten (konkret für Fujitsu fi-6130)
# -----------------------------------------------------------------------------
# Fest eingetragen, damit nicht versehentlich der Netzwerkscanner gewählt wird.
SCAN_DEVICE="fujitsu:fi-6130dj:455167"

# Vom Gerät gemeldete Quelle: ADF Front | ADF Back | ADF Duplex
SCAN_SOURCE="ADF Duplex"
# Option: Color | Gray
SCAN_MODE="Gray"
SCAN_RESOLUTION="300"
SCAN_FORMAT="tiff"

# Explizit auf A4 setzen, da der Scanner sonst gerne Letter-nahe Defaults meldet.
SCAN_PAGE_WIDTH="210"
SCAN_PAGE_HEIGHT="297"

# Sinnvolle Fujitsu-Optionen für Papierdokumente:
#   --swdeskew=yes    => leichte Schieflage korrigieren
#   --swcrop=yes      => Seitenränder enger setzen
#   --swdespeck=1     => kleine Einzelpunkte entfernen
#   --buffermode=On   => ADF effizienter puffern
#   --prepick=On      => nächste Seite frühzeitig greifen
#
# Bei Stabilitätsproblemen testweise zuerst buffermode/prepick entfernen.
SCAN_EXTRA_OPTS=""

# Leerseiten-Entfernung im Nachgang auf PDF-Ebene.
REMOVE_BLANK_PAGES="false"
BLANK_THRESHOLD="0.0012"
MIN_PAGES_TO_FILTER="2"

# Schutz gegen versehentliche Fremdaufrufe: nur scanbd-Aktion 'scan' akzeptieren.
EXPECTED_SCANBD_ACTION_REGEX="^scan$"

# -----------------------------------------------------------------------------
# Übergabe an Paperless
# -----------------------------------------------------------------------------
# filesystem = lokaler oder gemounteter Pfad (empfohlen für NFS-Mount)
# sftp       = Push per SFTP auf den Server
UPLOAD_METHOD="filesystem"

# Zielverzeichnis für filesystem.
# Empfohlen: auf dem Pi gemounteter echter Host-Consume-Ordner des Paperless-Servers.
TARGET_DIR="/mnt/paperless-consume"

# Optionaler Unterordner, z. B. "scanner" oder "eingang/rechnungen"
# Leer lassen, wenn direkt in TARGET_DIR geschrieben werden soll.
TARGET_SUBDIR=""

# Zielverzeichnis bei Bedarf automatisch anlegen.
AUTO_CREATE_TARGET_DIR="false"

# Optionaler Sicherheitsgurt für NFS/SMB:
# Nur schreiben, wenn dieser Pfad wirklich ein Mountpoint ist.
REQUIRE_TARGET_MOUNTPOINT="/mnt/paperless-consume"

# -----------------------------------------------------------------------------
# Alternative Übergabe per SFTP
# Nur relevant, wenn UPLOAD_METHOD="sftp" gesetzt wird.
# -----------------------------------------------------------------------------
SFTP_HOST="paperless.example.lan"
SFTP_PORT="22"
SFTP_USER="paperless-ingest"
SFTP_REMOTE_DIR="/srv/paperless/consume"
SFTP_IDENTITY_FILE="/root/.ssh/paperless_scan"
SFTP_STRICT_HOSTKEY="accept-new"
SFTP_CREATE_REMOTE_DIR="false"

# -----------------------------------------------------------------------------
# scanbd-Button-Mapping (nur Dokumentation)
# -----------------------------------------------------------------------------
# Mit diesen Werten rechnest du bei deinem Fujitsu sehr wahrscheinlich:
BUTTON_ACTION_NAME="scan"
BUTTON_FILTER="^scan$"
BUTTON_TRIGGER_TYPE="numerical"
BUTTON_FROM_VALUE="1"
BUTTON_TO_VALUE="0"

# Debug-Tipp:
#   sudo systemctl stop scanbd
#   sudo scanbd -f -d7
# Dann am Scanner die Taste drücken und im Log schauen, ob wirklich 'scan' triggert.
